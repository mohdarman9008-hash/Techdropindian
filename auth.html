<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechDropIndian – Login / Signup</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #ff6b00;
      --accent2: #ff9a3c;
      --text: #f0f0f0;
      --muted: #888;
      --input-bg: #1e1e1e;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Logo */
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
      text-align: center;
    }
    .logo span { color: var(--accent); }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--input-bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form.hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .field input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus { border-color: var(--accent); }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    /* Error / success messages */
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.error { background: #2a0a0a; color: #ff6b6b; border: 1px solid #5a1a1a; display: block; }
    .msg.success { background: #0a2a0a; color: #6bff6b; border: 1px solid #1a5a1a; display: block; }

    /* Dashboard (after login) */
    .dashboard { display: none; flex-direction: column; gap: 16px; }
    .dashboard.show { display: flex; }

    .welcome-banner {
      background: linear-gradient(135deg, #1a0f00, #2a1500);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .welcome-banner .emoji { font-size: 2rem; margin-bottom: 8px; }
    .welcome-banner h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      color: var(--accent2);
      margin-bottom: 4px;
    }
    .welcome-banner p { color: var(--muted); font-size: 0.85rem; }

    .user-info {
      background: var(--input-bg);
      border-radius: 8px;
      padding: 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .user-info strong { color: var(--text); display: block; margin-bottom: 2px; }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 11px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ff4444; color: #ff4444; }

    /* Auth card vs dashboard toggle */
    .auth-card { display: block; }
    .auth-card.hidden { display: none; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff4;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="logo">Tech<span>Drop</span>Indian 🇮🇳</div>

  <!-- AUTH CARD -->
  <div class="card auth-card" id="authCard">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form" id="loginForm">
      <div id="loginMsg" class="msg"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@email.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="loginEmail()">Login</button>
      <div class="divider">ya phir</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google se Login karo
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form hidden" id="signupForm">
      <div id="signupMsg" class="msg"></div>
      <div class="field">
        <label>Naam</label>
        <input type="text" id="signupName" placeholder="Apna naam likho"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@email.com"/>
      </div>
      <div class="field">
        <label>Password (min 6 characters)</label>
        <input type="password" id="signupPass" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="signupEmail()">Account Banao</button>
      <div class="divider">ya phir</div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google se Signup karo
      </button>
    </div>
  </div>

  <!-- DASHBOARD (after login) -->
  <div class="card" style="max-width:420px;width:100%;">
    <div class="dashboard" id="dashboard">
      <div class="welcome-banner">
        <div class="emoji">🎉</div>
        <h2 id="welcomeName">Welcome!</h2>
        <p>TechDropIndian pe aapka swagat hai</p>
      </div>
      <div class="user-info">
        <strong id="userEmail">—</strong>
        <span id="userProvider">—</span>
      </div>
      <button class="btn-logout" onclick="logout()">Logout kar do</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyD3miZVPmUVqQnSutWWm5FSaiprXkkn2EE",
      authDomain: "techdropindian.firebaseapp.com",
      projectId: "techdropindian",
      storageBucket: "techdropindian.firebasestorage.app",
      messagingSenderId: "65489078720",
      appId: "1:65489078720:web:917e055c11706b253ca025",
      measurementId: "G-S1EXG90071"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Auth state listener
    onAuthStateChanged(auth, (user) => {
      if (user) {
        showDashboard(user);
      } else {
        showAuth();
      }
    });

    function showDashboard(user) {
      document.getElementById('authCard').classList.add('hidden');
      document.getElementById('dashboard').classList.add('show');
      document.getElementById('welcomeName').textContent = user.displayName || 'Dost!';
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('userProvider').textContent =
        user.providerData[0]?.providerId === 'google.com'
          ? '🔵 Google se login kiya'
          : '📧 Email se login kiya';
    }

    function showAuth() {
      document.getElementById('authCard').classList.remove('hidden');
      document.getElementById('dashboard').classList.remove('show');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    // Tab switch
    window.switchTab = (tab) => {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    };

    // Email Login
    window.loginEmail = async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!email || !pass) return showMsg('loginMsg', 'Email aur password dono bharo!', 'error');
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        const msgs = {
          'auth/user-not-found': 'Yeh email registered nahi hai!',
          'auth/wrong-password': 'Password galat hai!',
          'auth/invalid-email': 'Email sahi format mein likho!',
          'auth/invalid-credential': 'Email ya password galat hai!'
        };
        showMsg('loginMsg', msgs[e.code] || 'Kuch gadbad hui, dobara try karo!', 'error');
      }
    };

    // Email Signup
    window.signupEmail = async () => {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass = document.getElementById('signupPass').value;
      if (!name || !email || !pass) return showMsg('signupMsg', 'Saari fields bharo!', 'error');
      if (pass.length < 6) return showMsg('signupMsg', 'Password kam se kam 6 characters ka hona chahiye!', 'error');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        showMsg('signupMsg', 'Account ban gaya! 🎉', 'success');
      } catch (e) {
        const msgs = {
          'auth/email-already-in-use': 'Yeh email already registered hai!',
          'auth/invalid-email': 'Email sahi format mein likho!',
          'auth/weak-password': 'Password thoda strong rakho!'
        };
        showMsg('signupMsg', msgs[e.code] || 'Kuch gadbad hui!', 'error');
      }
    };

    // Google Login
    window.loginGoogle = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        showMsg('loginMsg', 'Google login mein problem aayi, dobara try karo!', 'error');
      }
    };

    // Logout
    window.logout = async () => {
      await signOut(auth);
    };
  </script>
</body>
</html>
